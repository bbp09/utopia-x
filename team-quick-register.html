<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTOPIA X - 댄스팀 퀵 등록 (1분 컷)</title>
    
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .quick-register-container {
            min-height: 100vh;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.05), rgba(157, 78, 221, 0.05));
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .quick-register-header {
            text-align: center;
            margin-bottom: 40px;
            max-width: 600px;
        }
        
        .quick-register-header h1 {
            font-size: 32px;
            color: var(--text-primary);
            margin-bottom: 10px;
        }
        
        .quick-register-header .badge {
            display: inline-block;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .quick-register-form {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            max-width: 600px;
            width: 100%;
        }
        
        .form-section {
            margin-bottom: 35px;
        }
        
        .form-section-title {
            font-size: 18px;
            font-weight: 700;
            color: #FF6B6B;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255, 107, 107, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }
        
        .form-group label .required {
            color: #ff4757;
            margin-left: 3px;
        }
        
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 15px;
            transition: all 0.3s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #FF6B6B;
            box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.1);
        }
        
        .image-upload-box {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--bg-primary);
        }
        
        .image-upload-box:hover {
            border-color: #FF6B6B;
            background: rgba(255, 107, 107, 0.05);
        }
        
        .image-upload-box i {
            font-size: 48px;
            color: #FF6B6B;
            margin-bottom: 15px;
        }
        
        .social-inputs {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .social-input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .social-input-group i {
            font-size: 20px;
            width: 30px;
            text-align: center;
        }
        
        .social-input-group .fa-instagram {
            color: #E4405F;
        }
        
        .social-input-group .fa-tiktok {
            color: #000000;
        }
        
        .social-input-group .fa-youtube {
            color: #FF0000;
        }
        
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 30px;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link a:hover {
            color: #FF6B6B;
        }
        
        .info-box {
            background: rgba(255, 107, 107, 0.1);
            border-left: 4px solid #FF6B6B;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        
        .info-box p {
            color: var(--text-primary);
            font-size: 14px;
            margin: 0;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="quick-register-container">
        <div class="quick-register-header">
            <div class="badge"><i class="fas fa-bolt"></i> 1분 컷 빠른 등록</div>
            <h1><i class="fas fa-users"></i> 댄스팀 등록</h1>
            <p style="color: var(--text-secondary); font-size: 15px;">
                팀 기본 정보만 입력하고 프로젝트를 받아보세요! 나중에 언제든 추가할 수 있습니다.
            </p>
        </div>
        
        <form class="quick-register-form" id="quickRegisterForm">
            <div class="info-box">
                <p><i class="fas fa-info-circle"></i> <strong>댄스팀 전용 등록입니다.</strong> 개인 댄서는 '아티스트 등록'을 이용해주세요.</p>
            </div>
            
            <!-- 계정 정보 -->
            <div class="form-section">
                <div class="form-section-title">
                    <i class="fas fa-key"></i> 계정 정보
                </div>
                <div class="form-group">
                    <label>아이디 <span class="required">*</span></label>
                    <input type="text" class="form-input" name="username" placeholder="영문, 숫자 조합" required>
                </div>
                <div class="form-group">
                    <label>비밀번호 <span class="required">*</span></label>
                    <input type="password" class="form-input" name="password" placeholder="6자리 이상" required minlength="6">
                </div>
            </div>
            
            <!-- 팀 기본 정보 -->
            <div class="form-section">
                <div class="form-section-title">
                    <i class="fas fa-users"></i> 팀 기본 정보
                </div>
                <div class="form-group">
                    <label>팀 이름 <span class="required">*</span></label>
                    <input type="text" class="form-input" name="teamName" placeholder="예: URBAN CREW" required>
                </div>
                <div class="form-group">
                    <label>대표자 이름 <span class="required">*</span></label>
                    <input type="text" class="form-input" name="leaderName" placeholder="홍길동" required>
                </div>
                <div class="form-group">
                    <label>연락처 <span class="required">*</span></label>
                    <input type="tel" class="form-input" name="phone" placeholder="010-1234-5678" required pattern="[0-9-]+">
                </div>
                <div class="form-group">
                    <label>이메일 <span class="required">*</span></label>
                    <input type="email" class="form-input" name="email" placeholder="team@example.com" required>
                </div>
            </div>
            
            <!-- 팀 구성 정보 -->
            <div class="form-section">
                <div class="form-section-title">
                    <i class="fas fa-user-friends"></i> 팀 구성
                </div>
                <div class="form-group">
                    <label>팀 멤버 수 <span class="required">*</span></label>
                    <select class="form-input" name="memberCount" required>
                        <option value="">선택해주세요</option>
                        <option value="2-5">2-5명</option>
                        <option value="6-10">6-10명</option>
                        <option value="11-20">11-20명</option>
                        <option value="21+">21명 이상</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>결성 연도 <span class="required">*</span></label>
                    <select class="form-input" name="establishedYear" required>
                        <option value="">선택해주세요</option>
                    </select>
                </div>
            </div>
            
            <!-- 전문 분야 -->
            <div class="form-section">
                <div class="form-section-title">
                    <i class="fas fa-music"></i> 전문 분야
                </div>
                <div class="form-group">
                    <label>메인 장르 <span class="required">*</span></label>
                    <select class="form-input" name="genre" required>
                        <option value="">선택해주세요</option>
                        <option value="kpop">K-POP</option>
                        <option value="hiphop">힙합</option>
                        <option value="waacking">왁킹</option>
                        <option value="popping">팝핑</option>
                        <option value="locking">락킹</option>
                        <option value="breaking">비보잉</option>
                        <option value="house">하우스</option>
                        <option value="contemporary">현대무용</option>
                        <option value="jazz">재즈</option>
                        <option value="krump">크럼프</option>
                        <option value="dancehall">댄스홀</option>
                        <option value="other">기타</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>주 활동 지역 <span class="required">*</span></label>
                    <select class="form-input" name="location" required>
                        <option value="">선택해주세요</option>
                        <option value="seoul">서울</option>
                        <option value="gyeonggi">경기</option>
                        <option value="incheon">인천</option>
                        <option value="busan">부산</option>
                        <option value="daegu">대구</option>
                        <option value="gwangju">광주</option>
                        <option value="daejeon">대전</option>
                        <option value="ulsan">울산</option>
                        <option value="sejong">세종</option>
                        <option value="other">기타</option>
                    </select>
                </div>
            </div>
            
            <!-- 팀 프로필 & SNS -->
            <div class="form-section">
                <div class="form-section-title">
                    <i class="fas fa-camera"></i> 팀 프로필 사진 & SNS
                </div>
                <div class="form-group">
                    <label>팀 대표 프로필 사진 <span class="required">*</span></label>
                    <input type="file" id="profileImageInput" accept="image/*" style="display: none;" required>
                    <div class="image-upload-box" onclick="document.getElementById('profileImageInput').click()">
                        <i class="fas fa-camera"></i>
                        <p style="color: var(--text-primary); font-weight: 600; margin-bottom: 5px;">팀 사진 업로드</p>
                        <p style="color: var(--text-secondary); font-size: 13px;">클릭하여 사진 선택 (최대 1장)</p>
                    </div>
                    <div id="imagePreview" style="margin-top: 15px; display: none;">
                        <img id="previewImg" style="width: 100%; max-height: 300px; object-fit: cover; border-radius: 12px;">
                    </div>
                </div>
                <div class="form-group">
                    <label>소셜 미디어 링크 <span style="color: var(--text-secondary); font-weight: normal;">(1개 이상 필수)</span></label>
                    <div class="social-inputs">
                        <div class="social-input-group">
                            <i class="fab fa-instagram"></i>
                            <input type="url" class="form-input" name="instagram" placeholder="인스타그램 프로필 URL">
                        </div>
                        <div class="social-input-group">
                            <i class="fab fa-tiktok"></i>
                            <input type="url" class="form-input" name="tiktok" placeholder="틱톡 프로필 URL">
                        </div>
                        <div class="social-input-group">
                            <i class="fab fa-youtube"></i>
                            <input type="url" class="form-input" name="youtube" placeholder="유튜브 채널 URL">
                        </div>
                    </div>
                </div>
            </div>
            
            <button type="submit" class="submit-btn">
                <i class="fas fa-check-circle"></i> 팀 등록 완료하기
            </button>
        </form>
        
        <div class="back-link">
            <a href="index.html"><i class="fas fa-arrow-left"></i> 메인으로 돌아가기</a>
        </div>
    </div>
    
    <script>
        // 결성 연도 옵션 생성 (1980 ~ 현재)
        const establishedYearSelect = document.querySelector('select[name="establishedYear"]');
        const currentYear = new Date().getFullYear();
        for (let year = currentYear; year >= 1980; year--) {
            const option = document.createElement('option');
            option.value = year;
            option.textContent = year + '년';
            establishedYearSelect.appendChild(option);
        }
        
        // 이미지 미리보기
        document.getElementById('profileImageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('previewImg').src = e.target.result;
                    document.getElementById('imagePreview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });
        
        // 폼 제출
        document.getElementById('quickRegisterForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // SNS 링크 1개 이상 입력 체크
            const instagram = document.querySelector('input[name="instagram"]').value;
            const tiktok = document.querySelector('input[name="tiktok"]').value;
            const youtube = document.querySelector('input[name="youtube"]').value;
            
            if (!instagram && !tiktok && !youtube) {
                alert('소셜 미디어 링크를 최소 1개 이상 입력해주세요!');
                return;
            }
            
            // 프로필 사진 체크
            if (!document.getElementById('profileImageInput').files[0]) {
                alert('팀 프로필 사진을 업로드해주세요!');
                return;
            }
            
            // 임시로 localStorage에 저장
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            
            // 프로필 이미지를 Base64로 변환하여 저장
            const file = document.getElementById('profileImageInput').files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                data.profileImage = e.target.result;
                
                // localStorage에 저장
                localStorage.setItem('teamQuickProfile', JSON.stringify(data));
                
                // 성공 메시지
                alert('팀 등록이 완료되었습니다! 이제 AI가 추천하는 프로젝트를 받아보세요!');
                
                // 메인 페이지로 이동 (추후 대시보드로 변경 가능)
                window.location.href = 'index.html';
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
