<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTOPIA X - 아티스트 퀵 등록 (1분 컷)</title>
    
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .quick-register-container {
            min-height: 100vh;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.05), rgba(157, 78, 221, 0.05));
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .quick-register-header {
            text-align: center;
            margin-bottom: 40px;
            max-width: 600px;
        }
        
        .quick-register-header h1 {
            font-size: 32px;
            color: var(--text-primary);
            margin-bottom: 10px;
        }
        
        .quick-register-header .badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary-purple), var(--primary-blue));
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .quick-register-form {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            max-width: 600px;
            width: 100%;
        }
        
        .form-section {
            margin-bottom: 35px;
        }
        
        .form-section-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary-purple);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(157, 78, 221, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }
        
        .form-group label .required {
            color: #ff4757;
            margin-left: 3px;
        }
        
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 15px;
            transition: all 0.3s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary-purple);
            box-shadow: 0 0 0 3px rgba(157, 78, 221, 0.1);
        }
        
        .gender-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .gender-btn {
            padding: 16px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .gender-btn:hover {
            border-color: var(--primary-purple);
            transform: translateY(-2px);
        }
        
        .gender-btn.active {
            background: linear-gradient(135deg, var(--primary-purple), var(--primary-blue));
            border-color: var(--primary-purple);
            color: white;
        }
        
        .image-upload-box {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--bg-primary);
        }
        
        .image-upload-box:hover {
            border-color: var(--primary-purple);
            background: rgba(157, 78, 221, 0.05);
        }
        
        .image-upload-box i {
            font-size: 48px;
            color: var(--primary-purple);
            margin-bottom: 15px;
        }
        
        .social-inputs {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .social-input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .social-input-group i {
            font-size: 20px;
            width: 30px;
            text-align: center;
        }
        
        .social-input-group .fa-instagram {
            color: #E4405F;
        }
        
        .social-input-group .fa-tiktok {
            color: #000000;
        }
        
        .social-input-group .fa-youtube {
            color: #FF0000;
        }
        
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary-purple), var(--primary-blue));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 30px;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(157, 78, 221, 0.4);
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link a:hover {
            color: var(--primary-purple);
        }
    </style>
</head>
<body>
    <div class="quick-register-container">
        <div class="quick-register-header">
            <div class="badge"><i class="fas fa-bolt"></i> 1분 컷 빠른 등록</div>
            <h1><i class="fas fa-user-circle"></i> 아티스트 등록</h1>
            <p style="color: var(--text-secondary); font-size: 15px;">
                기본 정보만 입력하고 시작하세요! 나중에 언제든 추가할 수 있습니다.
            </p>
        </div>
        
        <form class="quick-register-form" id="quickRegisterForm">
            <!-- 계정 정보 -->
            <div class="form-section">
                <div class="form-section-title">
                    <i class="fas fa-key"></i> 계정 정보
                </div>
                <div class="form-group">
                    <label>아이디 <span class="required">*</span></label>
                    <input type="text" class="form-input" name="username" placeholder="영문, 숫자 조합" required>
                </div>
                <div class="form-group">
                    <label>비밀번호 <span class="required">*</span></label>
                    <input type="password" class="form-input" name="password" placeholder="6자리 이상" required minlength="6">
                </div>
            </div>
            
            <!-- 기본 식별 정보 -->
            <div class="form-section">
                <div class="form-section-title">
                    <i class="fas fa-id-card"></i> 기본 정보
                </div>
                <div class="form-group">
                    <label>본명 <span class="required">*</span></label>
                    <input type="text" class="form-input" name="realName" placeholder="홍길동" required>
                </div>
                <div class="form-group">
                    <label>활동명 (댄서 네임) <span class="required">*</span></label>
                    <input type="text" class="form-input" name="stageName" placeholder="HONG" required>
                </div>
                <div class="form-group">
                    <label>연락처 <span class="required">*</span></label>
                    <input type="tel" class="form-input" name="phone" placeholder="010-1234-5678" required pattern="[0-9-]+">
                </div>
            </div>
            
            <!-- 외형 데이터 -->
            <div class="form-section">
                <div class="form-section-title">
                    <i class="fas fa-user"></i> 외형 정보
                </div>
                <div class="form-group">
                    <label>성별 <span class="required">*</span></label>
                    <div class="gender-buttons">
                        <button type="button" class="gender-btn" data-gender="male">
                            <i class="fas fa-mars"></i> 남
                        </button>
                        <button type="button" class="gender-btn" data-gender="female">
                            <i class="fas fa-venus"></i> 여
                        </button>
                    </div>
                    <input type="hidden" name="gender" required>
                </div>
                <div class="form-group">
                    <label>출생연도 <span class="required">*</span></label>
                    <select class="form-input" name="birthYear" required>
                        <option value="">선택해주세요</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>키 (cm) <span class="required">*</span></label>
                    <input type="number" class="form-input" name="height" placeholder="170" required min="140" max="220">
                </div>
            </div>
            
            <!-- 직무 핵심 역량 -->
            <div class="form-section">
                <div class="form-section-title">
                    <i class="fas fa-music"></i> 전문 분야
                </div>
                <div class="form-group">
                    <label>메인 장르 <span class="required">*</span></label>
                    <select class="form-input" name="genre" id="genreSelect" required onchange="toggleGenreOtherField()">
                        <option value="">선택해주세요</option>
                        <option value="kpop">K-POP</option>
                        <option value="hiphop">힙합</option>
                        <option value="waacking">왁킹</option>
                        <option value="popping">팝핑</option>
                        <option value="locking">락킹</option>
                        <option value="breaking">비보잉</option>
                        <option value="house">하우스</option>
                        <option value="contemporary">현대무용</option>
                        <option value="jazz">재즈</option>
                        <option value="ballet">발레</option>
                        <option value="choreography">코레오그래피</option>
                        <option value="other">기타</option>
                    </select>
                </div>
                <!-- 기타 선택 시 표시되는 텍스트 입력 -->
                <div class="form-group" id="genreOtherField" style="display: none;">
                    <label>기타 장르 입력 <span class="required">*</span></label>
                    <input type="text" class="form-input" name="genreOther" id="genreOtherInput" placeholder="직접 입력해주세요 (예: 살사, 탭댄스 등)">
                </div>
                <div class="form-group">
                    <label>주 활동 지역 <span class="required">*</span></label>
                    <select class="form-input" name="location" required>
                        <option value="">선택해주세요</option>
                        <option value="seoul">서울</option>
                        <option value="gyeonggi">경기</option>
                        <option value="incheon">인천</option>
                        <option value="busan">부산</option>
                        <option value="daegu">대구</option>
                        <option value="gwangju">광주</option>
                        <option value="daejeon">대전</option>
                        <option value="ulsan">울산</option>
                        <option value="sejong">세종</option>
                        <option value="other">기타</option>
                    </select>
                </div>
            </div>
            
            <!-- 퀵 레퍼런스 -->
            <div class="form-section">
                <div class="form-section-title">
                    <i class="fas fa-camera"></i> 프로필 사진 & SNS
                </div>
                <div class="form-group">
                    <label>대표 프로필 사진 <span class="required">*</span></label>
                    <input type="file" id="profileImageInput" accept="image/*" style="display: none;" required>
                    <div class="image-upload-box" onclick="document.getElementById('profileImageInput').click()">
                        <i class="fas fa-camera"></i>
                        <p style="color: var(--text-primary); font-weight: 600; margin-bottom: 5px;">프로필 사진 업로드</p>
                        <p style="color: var(--text-secondary); font-size: 13px;">클릭하여 사진 선택 (최대 1장)</p>
                    </div>
                    <div id="imagePreview" style="margin-top: 15px; display: none;">
                        <img id="previewImg" style="width: 100%; max-height: 300px; object-fit: cover; border-radius: 12px;">
                    </div>
                </div>
                <div class="form-group">
                    <label>소셜 미디어 링크 <span style="color: var(--text-secondary); font-weight: normal;">(1개 이상 필수)</span></label>
                    <div class="social-inputs">
                        <div class="social-input-group">
                            <i class="fab fa-instagram"></i>
                            <input type="url" class="form-input" name="instagram" placeholder="인스타그램 프로필 URL">
                        </div>
                        <div class="social-input-group">
                            <i class="fab fa-tiktok"></i>
                            <input type="url" class="form-input" name="tiktok" placeholder="틱톡 프로필 URL">
                        </div>
                        <div class="social-input-group">
                            <i class="fab fa-youtube"></i>
                            <input type="url" class="form-input" name="youtube" placeholder="유튜브 채널 URL">
                        </div>
                    </div>
                </div>
            </div>
            
            <button type="submit" class="submit-btn">
                <i class="fas fa-check-circle"></i> 등록 완료하기
            </button>
        </form>
        
        <div class="back-link">
            <a href="index.html"><i class="fas fa-arrow-left"></i> 메인으로 돌아가기</a>
        </div>
    </div>
    
    <script>
        // 장르 '기타' 선택 시 텍스트 입력 필드 표시/숨김
        function toggleGenreOtherField() {
            const genreSelect = document.getElementById('genreSelect');
            const genreOtherField = document.getElementById('genreOtherField');
            const genreOtherInput = document.getElementById('genreOtherInput');
            
            if (genreSelect.value === 'other') {
                genreOtherField.style.display = 'block';
                genreOtherInput.setAttribute('required', 'required');
            } else {
                genreOtherField.style.display = 'none';
                genreOtherInput.removeAttribute('required');
                genreOtherInput.value = '';
            }
        }
        
        // 출생연도 옵션 생성 (1950 ~ 2010)
        const birthYearSelect = document.querySelector('select[name="birthYear"]');
        const currentYear = new Date().getFullYear();
        for (let year = currentYear - 14; year >= 1950; year--) {
            const option = document.createElement('option');
            option.value = year;
            option.textContent = year + '년';
            birthYearSelect.appendChild(option);
        }
        
        // 성별 선택
        document.querySelectorAll('.gender-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                document.querySelector('input[name="gender"]').value = this.dataset.gender;
            });
        });
        
        // 이미지 미리보기
        document.getElementById('profileImageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('previewImg').src = e.target.result;
                    document.getElementById('imagePreview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });
        
        // 폼 제출
        document.getElementById('quickRegisterForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 장르 '기타' 선택 시 텍스트 입력 체크
            const genreSelect = document.getElementById('genreSelect');
            const genreOtherInput = document.getElementById('genreOtherInput');
            
            if (genreSelect.value === 'other' && !genreOtherInput.value.trim()) {
                alert('기타 장르를 입력해주세요!');
                genreOtherInput.focus();
                return;
            }
            
            // SNS 링크 1개 이상 입력 체크
            const instagram = document.querySelector('input[name="instagram"]').value;
            const tiktok = document.querySelector('input[name="tiktok"]').value;
            const youtube = document.querySelector('input[name="youtube"]').value;
            
            if (!instagram && !tiktok && !youtube) {
                alert('소셜 미디어 링크를 최소 1개 이상 입력해주세요!');
                return;
            }
            
            // 성별 선택 체크
            if (!document.querySelector('input[name="gender"]').value) {
                alert('성별을 선택해주세요!');
                return;
            }
            
            // 프로필 사진 체크
            if (!document.getElementById('profileImageInput').files[0]) {
                alert('프로필 사진을 업로드해주세요!');
                return;
            }
            
            // 임시로 localStorage에 저장
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            
            // 프로필 이미지를 Base64로 변환하여 저장
            const file = document.getElementById('profileImageInput').files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                data.profileImage = e.target.result;
                
                // localStorage에 저장
                localStorage.setItem('artistQuickProfile', JSON.stringify(data));
                
                // 성공 메시지
                alert('가입이 완료되었습니다! 추가 프로필을 입력하고 매칭 확률을 높이세요!');
                
                // 2단계 프로필 페이지로 이동
                window.location.href = 'artist-profile-complete.html';
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
